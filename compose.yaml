name: growthguard

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api

    env_file:
      - .env

    environment:
      PORT: "8000"
      OPENAI_MODEL: "${OPENAI_MODEL:-gpt-5-nano}"
      TOOL_TIMEOUT_SECONDS: "${TOOL_TIMEOUT_SECONDS:-30}"
      REQUEST_TIMEOUT_SECONDS: "${REQUEST_TIMEOUT_SECONDS:-180}"
      MAX_CONCURRENT_REQUESTS: "${MAX_CONCURRENT_REQUESTS:-4}"
      AGENT_LOG_FILE: "/app/logs/agent.jsonl"

    ports:
      - "8000:8000"

    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./evaluation:/app/evaluation

    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

    restart: unless-stopped
    init: true

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.streamlit

    environment:
      PORT: "8501"
      GROWTHGUARD_API_URL: "http://api:8000"

    ports:
      - "8501:8501"

    depends_on:
      api:
        condition: service_healthy

    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8501/_stcore/health', timeout=3)"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

    restart: unless-stopped
    init: true